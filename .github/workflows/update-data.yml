name: Auto Update Airline Data

on:
  # 每天凌晨 3 点自动执行（UTC 时间，对应北京时间上午 11 点）
  schedule:
    - cron: '0 3 * * *'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫更新数据
        run: |
          python -c "from airline_app import create_csv; create_csv()"

      - name: 提交并推送更新
        run: |
          git config --local user.email "github-actions@example.com"
          git config --local user.name "GitHub Actions"
          git add airline_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新机队数据" && git push)
