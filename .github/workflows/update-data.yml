name: Auto Update Airline Data

on:
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨 3 点 UTC，对应北京时间 11 点
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：给 Actions 赋予写仓库的权限
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 避免权限冲突

      - name: 设置 Git 身份
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫更新数据
        run: |
          python -c "from airline_app import create_csv; create_csv()"

      - name: 提交并推送更新
        uses: ad-m/github-push-action@master
        with:
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
